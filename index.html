<title>Inferno — Hypercube</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#04060a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Inferno">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root{
    --void:#04060a; --void2:#080c14;
    --ink:#cfe4f2; --dim:#6b8296;
    color-scheme: dark;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(120% 90% at 50% 42%, #0a1020 0%, var(--void2) 40%, var(--void) 80%);
    color:var(--ink);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;
    overflow:hidden;height:100vh;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
  }
  #cv{position:fixed;top:0;right:0;bottom:0;left:0;width:100%;height:100%;display:block;touch-action:none}

  .hud{position:fixed;z-index:5;pointer-events:none}
  #brand{top:20px;left:22px;
    font-size:12px;letter-spacing:.42em;text-transform:uppercase;color:var(--ink);
    text-shadow:0 0 18px rgba(120,180,255,.5);font-weight:600}
  #brand b{color:#fff}
  #brand span{display:block;margin-top:5px;font-size:9.5px;letter-spacing:.26em;color:var(--dim);text-shadow:none}

  #state{top:22px;right:22px;text-align:right;
    font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim)}
  #state b{color:var(--ink);font-weight:600}
  #state .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:8px;
    vertical-align:middle;transition:background .4s, box-shadow .4s}

  #say{left:50%;transform:translateX(-50%);bottom:190px;
    width:min(760px,86vw);text-align:center;font-size:clamp(15px,2.2vw,20px);line-height:1.5;
    color:#eaf6ff;text-shadow:0 0 24px rgba(6,10,20,.9),0 2px 10px #000;opacity:0;transition:opacity .45s;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  #say.show{opacity:1}
  #say .who{display:block;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.34em;
    text-transform:uppercase;margin-bottom:10px;opacity:.85;transition:color .4s}
  #say .act{font-style:italic;opacity:.6;color:var(--dim)}   /* radnja (između zvezdica) — ne izgovara se */

  #moods{position:fixed;z-index:6;left:50%;transform:translateX(-50%);
    bottom:126px;display:flex;gap:7px;flex-wrap:wrap;
    justify-content:center;width:min(560px,94vw);pointer-events:auto}
  .chip{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;padding:7px 12px;border-radius:20px;
    background:rgba(10,15,24,.6);border:1px solid rgba(120,140,200,.28);color:var(--dim);cursor:pointer;
    transition:color .2s,border-color .2s,box-shadow .2s;backdrop-filter:blur(6px)}
  .chip:active{transform:scale(.95)}
  .chip.on{color:#fff}

  #dock{position:fixed;z-index:6;left:50%;transform:translateX(-50%);
    bottom:30px;display:flex;flex-direction:column;align-items:center;
    gap:14px;width:min(720px,92vw)}
  #mic{width:66px;height:66px;border-radius:50%;cursor:pointer;position:relative;
    border:1px solid rgba(140,170,220,.45);background:radial-gradient(circle at 50% 38%, rgba(140,190,255,.2), rgba(8,12,20,.6) 70%);
    color:var(--ink);font-size:24px;display:grid;place-items:center;pointer-events:auto;
    box-shadow:inset 0 0 24px rgba(120,170,255,.18);transition:transform .12s,box-shadow .3s,border-color .3s}
  #mic:active{transform:scale(.94)}
  #mic.live{animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:inset 0 0 26px rgba(120,190,255,.32),0 0 22px rgba(120,190,255,.4)}
    50%{box-shadow:inset 0 0 34px rgba(120,190,255,.5),0 0 46px rgba(120,190,255,.75)}}
  #row{display:flex;gap:10px;width:100%;pointer-events:auto}
  #q{flex:1;min-width:0;height:46px;padding:0 18px;border-radius:24px;background:rgba(8,13,22,.72);
    border:1px solid rgba(120,140,220,.32);color:var(--ink);font-size:15px;font-family:inherit;outline:none;
    backdrop-filter:blur(8px);transition:border-color .2s,box-shadow .2s}
  #q::placeholder{color:var(--dim)}
  #q:focus{border-color:rgba(140,200,255,.7);box-shadow:0 0 22px rgba(120,190,255,.25)}
  #send,#cam,#apps{width:46px;height:46px;flex:0 0 auto;border-radius:50%;cursor:pointer;background:rgba(8,13,22,.72);
    border:1px solid rgba(120,140,220,.32);color:#a9c8ff;font-size:18px;display:grid;place-items:center;
    transition:transform .12s;pointer-events:auto}
  #apps{display:none}                 /* vidljivo samo u Android app-u (native) */
  #send:active,#cam:active,#apps:active{transform:scale(.92)}
  /* GRID APLIKACIJA (samo u app-u) */
  #appgrid{position:fixed;top:0;right:0;bottom:0;left:0;z-index:20;background:rgba(4,6,10,.94);backdrop-filter:blur(10px);
    display:none;flex-direction:column;padding:24px 16px 16px}
  #appgrid.show{display:flex}
  #appgrid .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  #appgrid .head b{font-size:12px;letter-spacing:.34em;color:#8fb6ff}
  #appClose{font-size:22px;color:#a9c8ff;cursor:pointer;padding:4px 10px}
  #appList{overflow-y:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:14px 8px;align-content:start}
  .appTile{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;color:var(--ink)}
  .appTile img,.appTile .ph{width:52px;height:52px;border-radius:14px;background:rgba(20,28,44,.8);object-fit:cover;
    display:grid;place-items:center;font-size:20px;color:#8fb6ff}
  .appTile span{font-size:10px;text-align:center;line-height:1.2;max-width:72px;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap;color:var(--dim)}
  .appTile:active{transform:scale(.94)}
  #hint{font-size:10px;letter-spacing:.14em;color:var(--dim);text-align:center;min-height:12px}
  #tag{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:6;font-size:9px;
    letter-spacing:.2em;color:#3d4d5c;text-transform:uppercase}
  /* ---------- KOD: panel (piše + pokreće uživo, kao Claude) ---------- */
  #codePanel{position:fixed;inset:0;z-index:30;background:rgba(4,6,10,.97);backdrop-filter:blur(12px);
    display:none;flex-direction:column;padding:calc(env(safe-area-inset-top,0px) + 14px) 14px 14px}
  #codePanel.show{display:flex}
  #codePanel .chead{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex:0 0 auto}
  #codePanel .chead b{font-size:12px;letter-spacing:.28em;color:#8fb6ff;text-transform:uppercase;flex:1;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cbtn{font-size:12px;letter-spacing:.06em;padding:8px 14px;border-radius:20px;cursor:pointer;pointer-events:auto;
    background:rgba(12,18,30,.9);border:1px solid rgba(120,140,200,.34);color:#a9c8ff;white-space:nowrap;
    transition:transform .12s,border-color .2s,color .2s}
  .cbtn:active{transform:scale(.94)}
  .cbtn.run{color:#8affb0;border-color:rgba(90,220,150,.4)}
  .cbtn.on{color:#fff;border-color:rgba(140,200,255,.75)}
  #codeClose{font-size:22px;color:#a9c8ff;cursor:pointer;padding:2px 10px;pointer-events:auto}
  #codeBody{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
  .codeBlk{border:1px solid rgba(120,140,200,.2);border-radius:12px;overflow:hidden;background:#070b12;flex:0 0 auto}
  .codeBlk .blkbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(16,24,40,.7);
    border-bottom:1px solid rgba(120,140,200,.16)}
  .codeBlk .blkbar .lng{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#6b8296;flex:1}
  .codeBlk pre{margin:0;padding:14px;overflow-x:auto;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    font-size:13px;line-height:1.55;color:#d7e6f5;-webkit-user-select:text;user-select:text;white-space:pre;tab-size:2}
  .codeBlk pre::-webkit-scrollbar{height:7px}
  .codeBlk pre::-webkit-scrollbar-thumb{background:rgba(120,140,200,.3);border-radius:4px}
  /* bojenje sintakse */
  .tk-k{color:#7fb2ff}.tk-s{color:#8affb0}.tk-c{color:#5a6b7c;font-style:italic}.tk-n{color:#ffcf8f}.tk-f{color:#c99bff}
  /* uživo prikaz */
  #codeRun{flex:0 0 auto;display:none;flex-direction:column;border:1px solid rgba(90,220,150,.3);border-radius:12px;overflow:hidden;background:#fff}
  #codeRun.show{display:flex}
  #codeRun .rbar{display:flex;align-items:center;padding:7px 12px;background:#0d1520;border-bottom:1px solid rgba(90,220,150,.25)}
  #codeRun .rbar .lng{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#8affb0;flex:1}
  #codeRun iframe{width:100%;height:min(52vh,440px);border:0;background:#fff;display:block}
  @media (max-width:760px){
    #codePanel{padding:calc(env(safe-area-inset-top,0px) + 10px) 10px 10px}
    .cbtn{padding:7px 11px;font-size:11px}
    .codeBlk pre{font-size:12px;padding:12px}
    #codeRun iframe{height:min(46vh,380px)}
  }
  /* ---------- SLIKA: generisanje iz opisa ---------- */
  #imgPanel{position:fixed;inset:0;z-index:31;background:rgba(4,6,10,.98);backdrop-filter:blur(12px);
    display:none;flex-direction:column;padding:calc(env(safe-area-inset-top,0px) + 14px) 14px 14px}
  #imgPanel.show{display:flex}
  #imgPanel .chead{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex:0 0 auto}
  #imgPanel .chead b{font-size:12px;letter-spacing:.28em;color:#8fb6ff;text-transform:uppercase;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #imgWrap{flex:1;min-height:0;display:grid;place-items:center;position:relative;overflow:auto}
  #imgOut{max-width:100%;max-height:100%;border-radius:14px;display:none;box-shadow:0 6px 30px rgba(0,0,0,.5)}
  #imgSpin{color:#8fb6ff;font-size:13px;letter-spacing:.08em;text-align:center;padding:20px}
  @media (max-width:760px){ #imgPanel{padding:calc(env(safe-area-inset-top,0px) + 10px) 10px 10px} }
  @media (prefers-reduced-motion:reduce){#mic.live{animation:none}}
  @media (max-width:760px){
    #brand span{display:none}
    #brand{font-size:11px;letter-spacing:.3em;left:16px;top:16px}
    #state{font-size:9px;right:14px;top:18px}
    #say{bottom:178px;font-size:15px;width:92vw}
    #moods{bottom:120px;flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;gap:6px;padding:0 12px;width:100vw;-webkit-overflow-scrolling:touch;transform:none;left:0}
    #moods::-webkit-scrollbar{display:none}
    .chip{flex:0 0 auto;font-size:10px;padding:6px 11px}
    #dock{gap:10px;bottom:18px;width:94vw}
    #mic{width:58px;height:58px;font-size:22px}
    #row{gap:8px}
    #q{height:44px;font-size:14px;padding:0 15px}
    #send{width:44px;height:44px}
    #tag{font-size:8px}
  }
</style>

<canvas id="cv"></canvas>

<div id="brand" class="hud"><b>INFERNO</b></div>
<div id="state" class="hud"><b id="stTxt">miruje</b><span class="dot" id="stDot"></span></div>

<div id="say" class="hud"><span class="who" id="sayWho">Inferno</span><span id="sayText"></span></div>

<div id="dock">
  <div id="mic" title="Uključi buđenje — reci: „Inferno…"">🎙</div>
  <div id="row">
    <input id="q" type="text" placeholder="reci nešto Infernu…" autocomplete="off" />
    <div id="apps" title="Aplikacije">▦</div>
    <div id="cam" title="Inferno gleda kroz kameru">📷</div>
    <div id="send" title="pošalji">➜</div>
  </div>
  <div id="hint"></div>
</div>
<div id="tag" style="display:none"></div>

<div id="appgrid">
  <div class="head"><b>APLIKACIJE</b><div id="appClose">✕</div></div>
  <div id="appList"></div>
</div>

<div id="codePanel">
  <div class="chead">
    <b id="codeTitle">KOD</b>
    <div class="cbtn run" id="codeRunBtn" title="Pokreni uživo">▶ Pokreni</div>
    <div class="cbtn" id="codeSaveBtn" title="Sačuvaj na telefon">💾 Sačuvaj</div>
    <div class="cbtn" id="codeCopyBtn" title="Kopiraj sav kod">⧉ Kopiraj</div>
    <div id="codeClose" title="Zatvori">✕</div>
  </div>
  <div id="codeBody"></div>
  <div id="codeRun"><div class="rbar"><span class="lng">uživo</span><span class="cbtn" id="codeRunClose" style="padding:4px 10px">✕</span></div><iframe id="codeFrame" sandbox="allow-scripts allow-modals allow-downloads allow-popups" referrerpolicy="no-referrer"></iframe></div>
</div>

<div id="imgPanel">
  <div class="chead">
    <b id="imgTitle">SLIKA</b>
    <div class="cbtn run" id="imgRegen" title="Napravi ponovo">↻ Ponovo</div>
    <div class="cbtn" id="imgSaveBtn" title="Sačuvaj sliku">💾 Sačuvaj</div>
    <div id="imgClose" title="Zatvori" style="font-size:22px;color:#a9c8ff;cursor:pointer;padding:2px 10px;pointer-events:auto">✕</div>
  </div>
  <div id="imgWrap"><img id="imgOut" alt=""><div id="imgSpin">stvaram sliku…</div></div>
</div>

<script>
(() => {
  'use strict';
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let LOW = reduced;   // slabiji uređaj / aplikacija na telefonu → lakše crtanje (postavlja se niže kad se zna NATIVE)
  let LITE = false;    // ULTRA-lite: uključi se sam ako je telefon spor (adaptivno)
  const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  let W=0,H=0,DPR=1,CX=0,CY=0,S=1,MOBILE=false,COLS=0,CELL=16,drops=[],WIRES=[],FALL=[];
  function resize(){
    MOBILE = Math.min(innerWidth,innerHeight) < 760;
    DPR=Math.min(MOBILE?1:2, window.devicePixelRatio||1); W=innerWidth; H=innerHeight;
    cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
    cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0);
    CX=W/2; CY=H*0.42; S=Math.min(W,H)*0.29; initRain();
  }
  // debounce + ignoriši sitnu promenu visine (adresna traka telefona) da kocka NE poskakuje
  let _rt=0,_lw=0,_lh=0;
  addEventListener('resize',()=>{ if(innerWidth===_lw && Math.abs(innerHeight-_lh)<140) return; clearTimeout(_rt); _rt=setTimeout(()=>{ _lw=innerWidth; _lh=innerHeight; resize(); },200); });
  addEventListener('orientationchange',()=>setTimeout(resize,250));
  resize(); _lw=innerWidth; _lh=innerHeight;

  /* ---------- tesseract ---------- */
  const V=[]; for(let i=0;i<16;i++) V.push([(i&1)?1:-1,(i&2)?1:-1,(i&4)?1:-1,(i&8)?1:-1]);
  const E=[]; for(let a=0;a<16;a++) for(let b=a+1;b<16;b++){let d=0;for(let k=0;k<4;k++)if(V[a][k]!==V[b][k])d++;if(d===1)E.push([a,b]);}
  function rot(p,i,j,ang){const c=Math.cos(ang),s=Math.sin(ang),pi=p[i],pj=p[j];p[i]=pi*c-pj*s;p[j]=pi*s+pj*c;}
  function project(v,a){
    const p=[v[0],v[1],v[2],v[3]];
    rot(p,0,3,a.xw);rot(p,1,3,a.yw);rot(p,2,3,a.zw);rot(p,0,1,a.xy);rot(p,1,2,a.yz);rot(p,0,2,a.xz);
    const w4=2.4,k4=1/(w4-p[3]); let x=p[0]*k4,y=p[1]*k4,z=p[2]*k4;
    const z3=3.0,k3=z3/(z3-z);
    return {x:x*k3,y:y*k3,depth:((p[3]+1)/2)*0.5+((z+1)/2)*0.5};
  }

  /* ---------- RASPOLOŽENJA: boja + veličina + pokret ---------- */
  // near = boja bliskih ivica, far = dubina, core = žar jezgra
  const MOODS = {
    neutralno:{near:[96,165,215], far:[52,70,150],  core:[255,150,80], size:1.00, spin:1.0, jit:0.00, glow:0.14, breathe:0.020, coreI:0.35, squash:0,  label:'#8fb6ff'},
    radost:   {near:[255,206,92], far:[236,150,48], core:[255,225,150],size:1.14, spin:1.6, jit:0.04, glow:0.26, breathe:0.055, coreI:0.75, squash:0,  label:'#ffcf6b'},
    bes:      {near:[255,95,45],  far:[255,20,55],   core:[255,70,15],  size:1.30, spin:2.6, jit:0.55, glow:0.95, breathe:0.075, coreI:1.00, squash:0,  label:'#ff6a3c'},   // LJUT
    tuga:     {near:[70,120,205], far:[26,36,84],    core:[60,95,170],  size:0.70, spin:0.38,jit:0.00, glow:0.05, breathe:0.012, coreI:0.18, squash:0.22,label:'#5a86ff'},  // TUŽAN — spljošten, sitan
    mir:      {near:[128,150,255],far:[150,88,222],  core:[186,150,255],size:0.96, spin:0.55,jit:0.00, glow:0.12, breathe:0.030, coreI:0.42, squash:0,  label:'#b48cff'},
    nemir:    {near:[120,255,130],far:[40,120,90],   core:[170,255,120],size:0.90, spin:1.9, jit:0.34, glow:0.30, breathe:0.045, coreI:0.5,  squash:0,  label:'#7effa0'},
  };
  // trenutna (interpolirana) paleta
  const cur = {near:[96,165,215], far:[52,70,150], core:[255,150,80], size:1, spin:1, jit:0, glow:0.14, breathe:0.02, coreI:0.35, squash:0};
  let mood='neutralno';
  function lerpArr(a,b,t){a[0]+=(b[0]-a[0])*t;a[1]+=(b[1]-a[1])*t;a[2]+=(b[2]-a[2])*t;}
  function stepMood(dt){
    const m=MOODS[mood], k=Math.min(1,dt*1.1);   // POSTEPEN prelaz boje/tela ~2-3s (ne nagli)
    lerpArr(cur.near,m.near,k); lerpArr(cur.far,m.far,k); lerpArr(cur.core,m.core,k);
    cur.size+=(m.size-cur.size)*k; cur.spin+=(m.spin-cur.spin)*k; cur.jit+=(m.jit-cur.jit)*k;
    cur.glow+=(m.glow-cur.glow)*k; cur.breathe+=(m.breathe-cur.breathe)*k;
    cur.coreI+=(m.coreI-cur.coreI)*k; cur.squash+=(m.squash-cur.squash)*k;
  }
  function setMood(m){
    if(!MOODS[m]) return; const changed=(m!==mood); mood=m;
    const col=MOODS[m].label;
    const dot=document.getElementById('stDot'); if(dot){ dot.style.background=col; dot.style.boxShadow='0 0 12px '+col; }
    const w=document.getElementById('sayWho'); if(w) w.style.color=col;
    if(changed){ spawnSparks(16); coreFlash=Math.min(1.4,coreFlash+0.35); }   // iskrice na promenu boje
  }
  // ISKRICE: kratke čestice iz centra (boju uzimaju iz trenutne palete → zlatne kad je radost)
  const sparkP=[];
  function spawnSparks(n){ n=n||14; const t0s=(typeof performance!=='undefined'?performance.now():0);
    for(let i=0;i<n;i++){ const a=Math.random()*6.2832, sp=40+Math.random()*150;
      sparkP.push({x:CX,y:CY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-20,ms:t0s}); }
    if(sparkP.length>140) sparkP.splice(0,sparkP.length-140);
  }

  function rgba(c,a){return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;}
  function edge(depth,a){ // meša near/far po dubini
    const t=depth;
    return `rgba(${(cur.far[0]+(cur.near[0]-cur.far[0])*t)|0},${(cur.far[1]+(cur.near[1]-cur.far[1])*t)|0},${(cur.far[2]+(cur.near[2]-cur.far[2])*t)|0},${a})`;
  }

  /* ---------- aktivnost (sluša/misli/govori) — poverh raspoloženja ---------- */
  const Act={mode:'idle', e:0, t:0};
  function setAct(m){
    Act.mode=m; Act.t = m==='idle'?0.0 : m==='listen'?0.5 : m==='think'?1.0 : 0.7;
    const map={idle:'miruje',listen:'sluša',think:'misli',speak:'govori'};
    document.getElementById('stTxt').textContent=map[m];
  }

  const ax={xw:0,yw:0,zw:0,xy:0,yz:0,xz:0};
  let LAYERS=reduced?2:6;
  let voice=0;
  // PRAVI „Infernov kod" — koristi se i u pozadini (ispisan) i po ivicama kocke
  const CODE_LINES=[
    "const V=[];for(let i=0;i<16;i++)V.push([(i&1)?1:-1,(i&2)?1:-1]);",
    "function project(v,a){ rot(p,0,3,a.xw); rot(p,1,3,a.yw); }",
    "persona='Ti si INFERNO — vrhunski programer i analiticar.';",
    "if(mood==='bes'){ cur.size=1.30; cur.spin=2.6; cur.jit=0.55; }",

    m=low.match(/(-?\d+(?:[.,]\d+)?)\s*(?:farenhajt\w*|°?f)\s*(?:u|in)\s*(?:celzijus\w*|stepeni|°?c\b)/); if(m){ const f=parseFloat(m[1].replace(',','.')); const a=f+' °F je '+(Math.round((f-32)*5/9*10)/10)+' °C.'; show(a); speak(a); return true; }
    m=low.match(/(\d+(?:[.,]\d+)?)\s*(?:km|kilometar\w*)\s*(?:u|in)\s*(?:milj\w*|mi\b)/); if(m){ const v=parseFloat(m[1].replace(',','.')); const a=v+' km je '+(Math.round(v*0.621371*100)/100)+' milja.'; show(a); speak(a); return true; }
    m=low.match(/(\d+(?:[.,]\d+)?)\s*(?:milj\w*|mi\b)\s*(?:u|in)\s*(?:km|kilometar\w*)/); if(m){ const v=parseFloat(m[1].replace(',','.')); const a=v+' milja je '+(Math.round(v*1.60934*100)/100)+' km.'; show(a); speak(a); return true; }
    m=low.match(/(\d+(?:[.,]\d+)?)\s*(?:kg|kilogram\w*)\s*(?:u|in)\s*(?:funt\w*|lb\b)/); if(m){ const v=parseFloat(m[1].replace(',','.')); const a=v+' kg je '+(Math.round(v*2.20462*100)/100)+' funti.'; show(a); speak(a); return true; }
    m=low.match(/(\d+(?:[.,]\d+)?)\s*(?:funt\w*|lb\b)\s*(?:u|in)\s*(?:kg|kilogram\w*)/); if(m){ const v=parseFloat(m[1].replace(',','.')); const a=v+' funti je '+(Math.round(v/2.20462*100)/100)+' kg.'; show(a); speak(a); return true; }

    // NAVIKE
    m=s.match(/^(?:dodaj naviku|nova navika|prati naviku)\s+(.+)$/i);
    if(m){ const nm2=m[1].trim().toLowerCase(); const a=getHabits(); if(!a.some(h=>h.name===nm2)){ a.push({name:nm2, ticks:[]}); saveHabits(a); } const t='Pratim naviku „'+nm2+'". Reci „odradio '+nm2+'" kad je uradiš.'; show('✅ '+nm2); speak(t); return true; }
    m=s.match(/^(?:odradio(?: sam)?|odradila(?: sam)?|[šs]triklaj|uradio naviku|zavr[šs]io naviku)\s+(.+)$/i);
    if(m){ const q2=m[1].trim().toLowerCase(); const a=getHabits(); const h=a.find(x=>x.name.includes(q2)||q2.includes(x.name)); if(!h){ const t='Ne pratim naviku „'+q2+'". Reci „dodaj naviku '+q2+'".'; show(t); speak(t); return true; } const k=todayStr(); if(!h.ticks.includes(k)) h.ticks.push(k); saveHabits(a); const st=streakOf(h); const t='Bravo — „'+h.name+'", niz '+st+' '+(st===1?'dan':'dana')+'.'; show('🔥 '+h.name+' · '+st); speak(t); return true; }
    if(/\b(moje navike|kako stojim sa navikama)\b/i.test(low) || /^navike$/i.test(low)){ const a=getHabits(); if(!a.length){ const t='Ne pratiš nijednu naviku. Reci „dodaj naviku voda".'; show(t); speak(t); return true; } show('✅ Navike:\n'+a.map(h=>'• '+h.name+' — niz '+streakOf(h)).join('\n')); speak('Navike: '+a.map(h=>h.name+', niz '+streakOf(h)).join('; ')+'.'); return true; }

    // DNEVNIK
    m=s.match(/^(?:dnevnik|zapi[šs]i u dnevnik|u dnevnik|dragi dnevni[čc]e)\s*[:\-]?\s*(.+)$/i);
    if(m){ const e=m[1].trim(); const j=getJournal(); j.push({t:e, ts:Date.now()}); saveJournal(j); show('📔 '+e); speak('Zapisano u dnevnik.'); return true; }
    if(/pro[čc]itaj dnevnik|moj dnevnik|(?:šta|sta) sam pisao u dnevnik/i.test(low)){ const j=getJournal().slice(-7); if(!j.length){ const a='Dnevnik je prazan.'; show(a); speak(a); return true; } show('📔 Dnevnik:\n'+j.map(x=>'• '+x.t).join('\n')); speak('Poslednje iz dnevnika: '+j.map(x=>x.t).join('. ')); return true; }
    if(/\b(sa[žz]mi (?:mi )?(?:nedelju|dnevnik)|kako je pro[šs]la nedelja)\b/i.test(low)){ const wk=Date.now()-7*864e5; const j=getJournal().filter(x=>x.ts>=wk); if(!j.length){ const a='Nemam zapise iz ove nedelje.'; show(a); speak(a); return true; } ask('Sažmi kako je protekla nedelja na osnovu ovih dnevničkih zapisa; izvuci raspoloženje, ključne događaje i jednu poruku za sledeću nedelju:\n'+j.map(x=>'- '+x.t).join('\n')); return true; }

    // ODBROJAVANJE do događaja
    m=s.match(/^(?:zapamti doga[đdj]aj|dodaj doga[đdj]aj|novi doga[đdj]aj)\s+(.+?)\s+(\d{1,2}\.\s*\d{1,2}\.?(?:\s*\d{2,4})?)\s*$/i);
    if(m){ const nm2=m[1].trim().toLowerCase(); const dt=parseDate(m[2]); if(!dt){ const a='Ne razumem datum. Reci npr. 15.9.'; show(a); speak(a); return true; } const o=getEvents(); o[nm2]=dt.getTime(); saveEvents(o); const d=daysUntil(dt); show('📅 '+nm2+' · za '+d+' dana'); speak('Zapamtio „'+nm2+'" — za '+d+' dana.'); return true; }
    m=low.match(/koliko (?:je )?(?:dana |vremena )?do\s+(.+)/);
    if(m){ let rest=m[1].trim().replace(/[?.!]+$/,''); const dm=rest.match(/(\d{1,2}\.\s*\d{1,2}\.?(?:\s*\d{2,4})?)/); let dt=null, label=rest;
      if(dm){ dt=parseDate(dm[1]); label=rest.replace(dm[1],'').trim()||'tog datuma'; }
      else { const o=getEvents(); const key=Object.keys(o).find(k=>rest.includes(k)||k.includes(rest)); if(key){ dt=new Date(o[key]); label=key; } }
      if(dt){ const d=daysUntil(dt); const a=(d>0?('Do '+label+' ima '+d+' '+(d===1?'dan':'dana')+'.'):(d===0?(label+' je danas!'):(label+' je bilo pre '+(-d)+' dana.'))); show('📅 '+a); speak(a); return true; } }

    // VREME / DATUM (radi svuda)
    if(/\b(koliko je sati|koje je vreme|koliko je vremena|koliko ima sati)\b/.test(low)){
      const d=new Date(); const msg='Sada je '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')+'.'; show(msg); speak(msg); return true; }
    if(/\b(koji je (danas )?datum|koji je (danas )?dan|koji je dan(as)?)\b/.test(low)){
      const d=new Date(); const msg='Danas je '+DANI[d.getDay()]+', '+d.getDate()+'.'+(d.getMonth()+1)+'.'+d.getFullYear()+'.'; show(msg); speak(msg); return true; }

    // BELEŠKE — Infernove sopstvene (stvarno se pamte, rade svuda)
    m=s.match(/^(?:zabele[žz]i|zapi[šs]i|upi[šs]i(?:\s+u\s+(?:bele[šs]ke|beleške|notes))?|dodaj\s+(?:u\s+)?(?:bele[šs]ku|bele[šs]ke|notes))\s*[:\-]?\s*(.+)$/i);
    if(m){ const note=m[1].trim().replace(/^da\s+/i,''); const n=getNotes(); n.push({t:note, ts:Date.now()}); saveNotes(n);
      const msg='Zapisao: „'+note+'". Imaš '+n.length+' '+(n.length===1?'belešku':(n.length<5?'beleške':'beleški'))+'.'; show('📝 '+note); speak(msg); return true; }
    if(/(?:otvori|prika[žz]i|pro[čc]itaj|izlistaj|koje su|daj mi)\s+(?:moje\s+)?(?:bele[šs]k|notes)|[šs]ta sam (?:zapisao|zabele[žz]io|zabele[žz]ila)|moje bele[šs]ke/i.test(low)){
      const n=getNotes(); if(!n.length){ const a='Nemaš nijednu belešku.'; show(a); speak(a); return true; }
      const list=n.map((x,i)=>(i+1)+'. '+x.t).join('\n'); const spoken='Imaš '+n.length+' beleški. '+n.map((x,i)=>(i+1)+'. '+x.t).join('. ');
      show('📝 Beleške:\n'+list); speak(spoken); return true; }
    if(/\bobri[šs]i\s+(?:sve\s+)?(?:bele[šs]k|notes)/i.test(low)){ saveNotes([]); const a='Obrisao sam sve beleške.'; show(a); speak(a); return true; }

    if(!LAUNCHER) return false;   // sve ispod radi samo u aplikaciji

    // POZIV — traži potvrdu pre nego što pozove
    m=low.match(/^(?:pozovi|nazovi|zovni|zovi)\s+(?:mi\s+)?(.+)$/);
    if(m){ const who=m[1].replace(/\b(broj|telefon|mobilni)\b/g,'').trim(); const c=await resolveContact(who);
      if(c&&c.number){
        pendingAction={ run:async()=>{ show('*zovem '+c.name+'*'); speak('Zovem '+c.name); try{await LAUNCHER.call({number:c.number});}catch(_){} } };
        const qs='Da pozovem '+c.name+' ('+c.number+')? Reci „da" ili „ne".'; show(qs); speak('Da pozovem '+c.name+'? Reci da ili ne.'); }
      else { const msg='Ne nalazim „'+who+'" u kontaktima.'; show(msg); speak(msg); } return true; }

    // PORUKA: „pošalji poruku <ime> <tekst>" / „poruka <ime>: <tekst>" — traži potvrdu (i sadržaj) pre slanja
    m=s.match(/^(?:po[šs]alji|napi[šs]i|pi[šs]i)\s+(?:sms\s+)?(?:poruku|poruka|sms)?\s*(.+)$/i) || s.match(/^poruka\s+(.+)$/i);
    if(m && /^(?:po[šs]alji|napi[šs]i|pi[šs]i|poruka)/i.test(s) && !/(whatsapp|vocap|vacap|viber|vajber)/i.test(low)){
      let body=m[1].trim(), name=body, txt='';
      const sep=body.match(/^(.+?)(?:\s*:\s*|\s+(?:da|poruku|tekst|sa tekstom)\s+)(.+)$/i);
      if(sep){ name=sep[1].trim(); txt=sep[2].trim(); }
      else { const p=body.split(/\s+/); name=p.shift(); txt=p.join(' '); }
      const c=await resolveContact(name);
      if(c&&c.number){
        if(!txt){ const msg='Šta da napišem '+c.name+'? Reci: pošalji '+c.name+' pa tekst.'; show(msg); speak(msg); return true; }
        pendingAction={ run:async()=>{ show('*šaljem poruku '+c.name+'*'); speak('Šaljem poruku '+c.name); try{await LAUNCHER.sendSms({number:c.number,text:txt});}catch(_){} } };
        const qs='Da pošaljem '+c.name+' poruku: „'+txt+'"? Reci „da" ili „ne".'; show(qs); speak('Da pošaljem '+c.name+' poruku: '+txt+'? Reci da ili ne.'); }
      else { const msg='Ne nalazim „'+name+'" u kontaktima.'; show(msg); speak(msg); } return true; }

    // WHATSAPP / VIBER (preko linka; ime PRE aplikacije: „pošalji Ani na whatsapp da kasnim")
    m=s.match(/^(?:po[šs]alji\s+)?([a-zšđčćž0-9 ]+?)\s+(?:na\s+|preko\s+)?(whatsapp|vocap|vacap|viber|vajber)\s*[:\-]?\s*(.*)$/i);
    if(m && /(whatsapp|vocap|vacap|viber|vajber)/i.test(low)){
      const app=/vi?ber|vajber/i.test(m[2])?'Viber':'WhatsApp'; const name=m[1].replace(/^po[šs]alji\s+/i,'').trim(); const txt=(m[3]||'').trim();
      const c=await resolveContact(name); if(!(c&&c.number)){ const a='Ne nalazim „'+name+'" u kontaktima.'; show(a); speak(a); return true; }
      const num=c.number.replace(/[^0-9]/g,'');
      const url=app==='WhatsApp'?('https://wa.me/'+num+(txt?('?text='+encodeURIComponent(txt)):'')):('viber://chat?number='+encodeURIComponent('+'+num));
      pendingAction={ run:async()=>{ show('*'+app+' → '+c.name+'*'); speak('Otvaram '+app); openMaps(url); } };
      const qs='Da otvorim '+app+' za '+c.name+(txt?(' sa porukom: „'+txt+'"'):'')+'? Reci „da" ili „ne".'; show(qs); speak('Da otvorim '+app+' za '+c.name+'? da ili ne.'); return true; }

    // PODELI LOKACIJU (opciono nekome)
    if(/\b(podeli (?:moju )?lokaciju|po[šs]alji (?:moju )?lokaciju|gde sam)\b/i.test(low)){
      const c=await geo(); if(!c){ const t='Ne mogu do lokacije — dozvoli pristup lokaciji.'; show(t); speak(t); return true; }
      const link='https://maps.google.com/?q='+c.latitude+','+c.longitude;
      const who=(low.match(/\b(?:sa|za)\s+([a-zšđčćž ]{2,25})$/)||[])[1];
      if(who){ const ct=await resolveContact(who.trim()); if(ct&&ct.number){ pendingAction={ run:async()=>{ try{await LAUNCHER.sendSms({number:ct.number,text:'Moja lokacija: '+link});}catch(_){}; show('*poslao lokaciju '+ct.name+'*'); speak('Poslao'); } }; const qs='Da pošaljem lokaciju '+ct.name+'? Reci „da" ili „ne".'; show(qs); speak('Da pošaljem lokaciju '+ct.name+'? da ili ne.'); return true; } }
      copyText(link); show('📍 '+link); speak('Evo tvoje lokacije — kopirao sam link i otvaram mape.'); openMaps(link); return true; }

    // ALARM
    m=low.match(/(?:podesi|namesti|postavi|uklju[čc]i|stavi)\s+alarm(?:\s+(?:za|u|na))?\s*(\d{1,2})(?:[:.h]\s*(\d{2}))?/);
    if(m){ const h=Math.min(23,parseInt(m[1],10)||0), mi=Math.min(59,parseInt(m[2]||'0',10)||0);
      show('*alarm '+h+':'+String(mi).padStart(2,'0')+'*'); speak('Postavljam alarm u '+h+(mi?(' i '+mi):'')); try{await LAUNCHER.setAlarm({hour:h,minute:mi,message:'Inferno'});}catch(_){}; return true; }

    // TAJMER
    m=low.match(/(?:podesi|namesti|uklju[čc]i|postavi|stavi)\s+tajmer(?:\s+(?:na|za))?\s*(\d{1,3})\s*(sekund\w*|minut\w*|sat\w*|[čc]as\w*)?/);
    if(m){ const n=parseInt(m[1],10)||1, u=m[2]||'minut'; let sec=n*60; if(/sekund/.test(u)) sec=n; else if(/sat|[čc]as/.test(u)) sec=n*3600;
      show('*tajmer '+n+' '+u+'*'); speak('Tajmer'); try{await LAUNCHER.setTimer({seconds:sec,message:'Inferno'});}catch(_){}; return true; }

    // MUZIKA — kontrola trenutnog plejera (media dugmad)
    if(/\b(pauzir\w*|pauza|zaustavi\s+(?:muzik\w*|pesm\w*)|zaustavi muziku)\b/.test(low)){ try{await LAUNCHER.media({action:'pause'});}catch(_){}; show('*pauza*'); return true; }
    if(/\b(slede[ćc]\w*|naredn\w*|preskoč\w*)\b/.test(low)){ try{await LAUNCHER.media({action:'next'});}catch(_){}; show('*sledeća pesma*'); return true; }
    if(/\b(prethodn\w*|vrati\s+pesm\w*|pesm\w*\s+nazad)\b/.test(low)){ try{await LAUNCHER.media({action:'prev'});}catch(_){}; show('*prethodna pesma*'); return true; }
    if(/^nastavi\b/.test(low)){ try{await LAUNCHER.media({action:'play'});}catch(_){}; show('*nastavljam*'); return true; }

    // PUSTI: „pusti muziku" -> nastavi plejer;  „pusti <naslov>" / „pusti na jutjubu <naslov>" -> YouTube
    m=s.match(/^(?:pusti|pu[šs]taj)\s+(.+)$/i);
    if(m){
      let w=m[1].trim().replace(/^(?:mi|nam|molim te)\s+/i,'');
      if(/^(?:muziku|muzika|pesmu|pesma|numeru|ne[šs]to|bilo[ šs]ta)\s*$/i.test(w)){
        try{await LAUNCHER.media({action:'play'});}catch(_){}; show('*puštam muziku*'); speak('Puštam'); return true; }
      w=w.replace(/^(?:na\s+)?(?:youtube|jutjub\w*|jutub\w*|ju\s?tjub\w*)\s+/i,'')   // „na jutjubu X" -> X
         .replace(/\s+na\s+(?:youtube|jutjub\w*)\s*$/i,'')                            // „X na jutjubu" -> X
         .replace(/^(?:pesmu|pesma|numeru|snimak)\s+/i,'').trim();
      if(!w) w=m[1].trim();
      show('*YouTube: '+w+'*'); speak('Puštam '+w);
      try{ await LAUNCHER.youtube({query:w}); }catch(_){}
      if(await accessOn()){ await wait(3200); try{ await ACCESS.tap({x:0.28,y:0.30}); }catch(_){} }   // kucni prvi rezultat
      return true;
    }
    // „jutjub X" bez „pusti"
    m=s.match(/^(?:na\s+)?(?:youtube|jutjub\w*|jutub\w*|ju\s?tjub\w*)\s+(.+)$/i);
    if(m){ const qy=m[1].trim(); show('*YouTube: '+qy+'*'); speak('Puštam '+qy);
      try{ await LAUNCHER.youtube({query:qy}); }catch(_){}
      if(await accessOn()){ await wait(3200); try{ await ACCESS.tap({x:0.28,y:0.30}); }catch(_){} }
      return true; }

    // ČITANJE/ASISTENT: ako traži da NAĐE i PROČITA/ISPRIČA nešto → ne otvaraj browser, pusti mozak (on pretraži net i pročita naglas)
    const wantsRead=/pro[čc]itaj|reci mi|ka[žz]i mi|ispri[čc]aj|ispri[čc]a|saznaj|istra[žz]|zanimljiv|vesti|novosti|[šs]ta ima (?:novo|zanimljivo)|[šs]ta se de[šs]ava|objasni|sa[žz]mi|rezimira/i.test(low);
    // PRETRAGA / INTERNET (otvori browser) — samo kad NE traži da mu se pročita
    m=s.match(/^(?:pretra[žz]i|guglaj|potra[žz]i|na[đdj]i na (?:netu|internetu|guglu)|pretraga)\s+(.+)$/i);
    if(m && !wantsRead){ const qy=m[1].trim(); show('*tražim: '+qy+'*'); speak('Tražim '+qy); try{await LAUNCHER.webSearch({query:qy});}catch(_){}; return true; }
    m=s.match(/^otvori\s+(?:sajt|stranicu|link|adresu)\s+(.+)$/i);
    if(m){ const u=m[1].trim(); show('*otvaram '+u+'*'); try{await LAUNCHER.openUrl({url:u});}catch(_){}; return true; }

    // ZATVORI / IZAĐI — vrati se na početni (Inferno); sa Pristupačnošću i „nazad"
    if(/^(?:zatvori|izađi|izadji|skloni(?:\s+(?:ovo|to))?|ugasi\s+(?:ovo|to|aplikaciju|ekran)|vrati se na po[čc]etnu|na po[čc]etni\b)/.test(low)){
      show('*zatvaram*');
      if(ACCESS && await accessOn()){ try{await ACCESS.back();}catch(_){}; await wait(150); }
      try{ await LAUNCHER.openApp({package:'com.inferno.app'}); }catch(_){}
      return true; }

    // PODEŠAVANJA (wifi/podaci/bluetooth… panel — od Androida 10 se ne pale programski)
    m=low.match(/(?:otvori|prika[žz]i|u[đdj]i u|podesi|uklju[čc]i|isklju[čc]i)\s+(?:pode[šs]avanja(?:\s+za)?\s+)?(vaj?faj|wi-?fi|bluetooth|blutut|zvuk|ton|ekran|displej|lokacij\w*|baterij\w*|mobilne? podat\w*|mobilni internet|internet|pode[šs]avanja)\b/);
    if(m){ const w=m[1]; let which='settings';
      if(/vaj?faj|wi-?fi/.test(w)) which='wifi'; else if(/blue|blut/.test(w)) which='bluetooth';
      else if(/zvuk|ton/.test(w)) which='sound'; else if(/ekran|displej/.test(w)) which='display';
      else if(/lokacij/.test(w)) which='location'; else if(/baterij/.test(w)) which='battery';
      else if(/podat|internet/.test(w)) which='data';
      show('*otvaram podešavanja*'); try{await LAUNCHER.openSettings({which});}catch(_){}; return true; }

    // ACCESSIBILITY: uključivanje + Inferno sam kuca po ekranu bilo koje aplikacije
    if(/\b(uklju[čc]i|dozvoli|daj\s+mu|omogu[ćc]i)\s+(pristupa[čc]nost|kontrolu(?:\s+telefona|\s+ekrana)?|access)\b/.test(low)){
      show('*otvaram Pristupačnost*'); speak('Otvaram Pristupačnost — nađi Inferno i uključi ga.'); try{ ACCESS&&ACCESS.openSettings(); }catch(_){}; return true; }
    if(ACCESS){
      if(/\b(nazad|vrati se)\b/.test(low) && !/pesm/.test(low)){ try{await ACCESS.back();}catch(_){}; show('*nazad*'); return true; }
      if(/\b(po[čc]etni ekran|na po[čc]etnu|home)\b/.test(low)){ try{await ACCESS.home();}catch(_){}; show('*početni ekran*'); return true; }
      if(/\b(nedavn\w*|otvorene aplikacije|multitasking)\b/.test(low)){ try{await ACCESS.recents();}catch(_){}; show('*nedavne*'); return true; }
      if(/\b(obave[šs]tenj\w*|notifikacij\w*)\b/.test(low)){ try{await ACCESS.notifications();}catch(_){}; show('*obaveštenja*'); return true; }
      if(/\b(skrol\w*|listaj|pomeri\s+(?:gore|dole|levo|desno))\b/.test(low)){ const dir=/gore|nagore/.test(low)?'up':(/levo/.test(low)?'left':(/desno/.test(low)?'right':'down')); try{await ACCESS.swipe({dir});}catch(_){}; show('*skrol '+dir+'*'); return true; }
      m=low.match(/^(?:klikni|klik|tapni|tapni na|pritisni|stisni|izaberi|selektuj)\s+(?:na\s+|dugme\s+)?(.+)$/);
      if(m){ let ok=false; try{ const r=await ACCESS.click({text:m[1].trim()}); ok=r&&r.ok; }catch(_){}; const msg=ok?('*kliknuo „'+m[1].trim()+'"*'):('Ne vidim „'+m[1].trim()+'" na ekranu.'); show(msg); if(!ok)speak(msg); return true; }
    }

    // APLIKACIJA: „otvori/pokreni/upali X"
    m=low.match(/^\s*(?:otvori|pokreni|upali|startuj|pusti aplikaciju)\s+(.+?)\s*$/);
    if(m){ if(!appsCache.length) await loadApps(); const a=findApp(m[1]);
      if(a){ const ok=await openAppByPkg(a.package); const msg=ok?('*otvaram '+a.label+'*'):('Ne mogu da otvorim '+a.label+'.'); show(msg); speak(msg); }
      else { const msg='Ne nalazim aplikaciju „'+m[1]+'".'; show(msg); speak(msg); } return true; }

    return false;
  }
  // stari naziv zadržan zbog poziva iz ask()
  const tryOpenCommand = tryPhoneCommand;

  // zvučni „prag" kad se probudi
  let actx=null;
  function chime(){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); const o=actx.createOscillator(),g=actx.createGain();
    o.frequency.value=880; o.type='sine'; o.connect(g); g.connect(actx.destination); const T=actx.currentTime; g.gain.setValueAtTime(0.0001,T);
    g.gain.exponentialRampToValueAtTime(0.14,T+0.02); g.gain.exponentialRampToValueAtTime(0.0001,T+0.28); o.start(T); o.stop(T+0.3);}catch(_){} }

  /* ---- BUĐENJE NA GLAS: „Inferno" (radi dok je aplikacija otvorena i ekran upaljen) ---- */
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  let rec=null, wakeOn=false, speaking=false, awakeUntil=0, restartT=0;
  const WAKE=/(hej|ej|hey)\s+inferno|\binferno\b/;
  function startRec(){
    if(!SR||!wakeOn||speaking) return;
    try{
      rec=new SR(); rec.lang='sr-RS'; rec.continuous=true; rec.interimResults=false; rec.maxAlternatives=1;
      rec.onstart=()=>{ mic.classList.add('live'); if(Act.mode==='idle') setAct('listen'); };
      rec.onerror=e=>{ if(e.error==='not-allowed'||e.error==='service-not-allowed'){
        // Prepoznavanje reči nije dostupno (npr. Brave/desktop) — ali mic-UŽIVO i dalje radi ako je dozvoljen
        if(micAnalyser){ hint.textContent='slušam tvoj glas (bez „Inferno" u ovom pregledaču)'; }
        else { wakeOn=false; mic.classList.remove('live'); hint.textContent='mikrofon blokiran — koristi tekst'; setAct('idle'); } } };
      rec.onend=()=>{ mic.classList.remove('live'); if(wakeOn&&!speaking){ clearTimeout(restartT); restartT=setTimeout(startRec,300); } else if(Act.mode==='listen') setAct('idle'); };
      rec.onresult=e=>{ const t=(e.results[e.results.length-1][0].transcript||'').trim().toLowerCase(); heard(t); };
      rec.start();
    }catch(_){}
  }
  function heard(t){
    if(!t) return;
    const nowT=performance.now();
    if(nowT<awakeUntil){ awakeUntil=0; ask(t); return; }
    const m=t.match(WAKE);
    if(m){ const rest=t.slice(t.indexOf(m[0])+m[0].length).replace(/^[,\s]+/,'').trim();
      if(rest) ask(rest); else { awakeUntil=nowT+7000; chime(); buzz([20,40,30]); coreFlash=Math.min(1.4,coreFlash+0.8); wake(); show('Tu sam, '+knownName()+'. Slušam…'); hint.textContent='da? slušam…'; } }
  }
  async function toggleWake(){
    wakeOn=!wakeOn;
    if(wakeOn){
      if(NATIVE && !SPEECH){ wakeOn=false; hint.textContent='treba nov APK da bih te čuo'; const a='Treba mi nov APK da bih čuo glas — stari to ne može. Do tada mi piši.'; show(a); speak(a); return; }
      if(NATIVE && SPEECH){ wake(); nativeLoop(); return; }   // NATIVNO slušanje (pouzdano u aplikaciji)
      if(NATIVE) await disarmHotword();             // oslobodi mikrofon za web slušanje (bez sukoba sa Vosk-om)
      wake(); mic.classList.add('live'); if(Act.mode==='idle') setAct('listen');
      const ok=await startMicViz();                 // PRIMARNO: reaguj na tvoj glas (uvek pokušaj)
      if(SR){ hint.textContent='reci: „Inferno…"'; startRec(); }   // BONUS: buđenje na reč (ako radi u ovom pregledaču)
      else if(ok){ hint.textContent='slušam tvoj glas'; }
      // ako mikrofon nije dozvoljen, startMicViz je već postavio poruku
    } else {
      nativeLoopOn=false; try{ SPEECH&&SPEECH.stop(); }catch(_){}
      clearTimeout(restartT); try{rec&&rec.stop();}catch(_){}; stopMicViz(); mic.classList.remove('live'); hint.textContent=''; if(Act.mode==='listen') setAct('idle');
      if(NATIVE) armHotword();                       // vrati pozadinsko slušanje „Inferno"
    }
  }
  // 🎙 dugme: na hands-free telefonu = „slušaj odmah" (bez izgovaranja „Inferno"); inače stara logika
  mic.addEventListener('click',()=>{ if(HANDSFREE){ forceListen(); } else { toggleWake(); } });
  // DUGI PRITISAK na 🎙 = Vosk test: u prvom planu pusti Vosk i pokaži šta čuje (da vidimo hvata li „Inferno")
  if(HANDSFREE && HOTWORD){
    let lp=0;
    const startLP=()=>{ lp=setTimeout(async()=>{ voskTest=!voskTest;
        if(voskTest){ try{ SPEECH&&SPEECH.stop(); }catch(_){}; await wait(200); await armHotword(); show('VOSK TEST — reci „Inferno"'); hint.textContent='Vosk test uključen'; buzz([10,30,10,30]); }
        else{ await disarmHotword(); show('Vosk test isključen'); hint.textContent=''; if(!wakeLoopOn) wakeLoop(); }
      }, 700); };
    const cancelLP=()=>clearTimeout(lp);
    mic.addEventListener('pointerdown',startLP);
    mic.addEventListener('pointerup',cancelLP);
    mic.addEventListener('pointerleave',cancelLP);
  }
  if(synth) synth.onvoiceschanged=()=>{};

  /* ---- APLIKACIJA: hypercube ikonica + manifest u letu → „Add to Home screen" (standalone, ne browser) ---- */
  function makeIcon(size){
    const c=document.createElement('canvas'); c.width=c.height=size; const g=c.getContext('2d');
    g.fillStyle='#05070c'; g.fillRect(0,0,size,size);
    const cx=size/2, cy=size/2, s=size*0.24, d=size*0.12;
    function cube(scale,col,w){
      const S=s*scale, D=d*scale;
      const F=[[-S,-S],[S,-S],[S,S],[-S,S]], B=F.map(p=>[p[0]+D,p[1]-D]);
      g.strokeStyle=col; g.lineWidth=w; g.lineJoin='round';
      const path=arr=>{g.beginPath();arr.forEach((p,i)=>{const x=cx+p[0],y=cy+p[1];i?g.lineTo(x,y):g.moveTo(x,y);});g.closePath();g.stroke();};
      path(F); path(B);
      for(let i=0;i<4;i++){ g.beginPath(); g.moveTo(cx+F[i][0],cy+F[i][1]); g.lineTo(cx+B[i][0],cy+B[i][1]); g.stroke(); }
    }
    cube(1.6,'rgba(33,230,255,0.25)',size*0.055);   // meki sjaj
    cube(1.6,'#21e6ff',size*0.02);                  // spoljna kocka
    cube(0.8,'#8bf0ff',size*0.015);                 // unutrašnja (dubina)
    const gr=g.createRadialGradient(cx,cy,0,cx,cy,s*0.6);
    gr.addColorStop(0,'rgba(255,185,120,0.95)'); gr.addColorStop(1,'rgba(255,90,30,0)');
    g.fillStyle=gr; g.beginPath(); g.arc(cx,cy,s*0.6,0,Math.PI*2); g.fill();
    return c.toDataURL('image/png');
  }
  (function setupPWA(){
    try{
      const i192=makeIcon(192), i512=makeIcon(512);
      const lf=document.createElement('link'); lf.rel='icon'; lf.href=i192; document.head.appendChild(lf);
      const la=document.createElement('link'); la.rel='apple-touch-icon'; la.href=i192; document.head.appendChild(la);
      const man={name:'Inferno',short_name:'Inferno',start_url:'.',scope:'.',display:'standalone',
        background_color:'#04060a',theme_color:'#04060a',description:'Inferno — hypercube',
        icons:[{src:i192,sizes:'192x192',type:'image/png',purpose:'any'},{src:i512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
      const blob=new Blob([JSON.stringify(man)],{type:'application/manifest+json'});
      const ml=document.createElement('link'); ml.rel='manifest'; ml.href=URL.createObjectURL(blob); document.head.appendChild(ml);
      if(location.protocol.startsWith('http') && 'serviceWorker' in navigator){
        navigator.serviceWorker.register('sw.js').then(r=>{try{r.update();}catch(_){}}).catch(()=>{});
      }
    }catch(_){}
  })();

  setMood('neutralno'); setAct('idle'); loadMemory();
  setTimeout(()=>show('Budim se. Uključi 🎙 i reci „Inferno…" — ili piši. Pamtim te.'),900);
  // PROAKTIVNO: kad otvoriš Inferno, i svaki put kad se vratiš na njega — pogleda sat + rutinu i sam ponudi
  setTimeout(proactiveGreet, 3000);
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(proactiveGreet, 900); });
  // PODSETNICI: dok je Inferno otvoren, javi kad dođe vreme
  setInterval(remTick, 30000);
})();
</script>
