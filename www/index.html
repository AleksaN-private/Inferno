<!doctype html>
<html lang="sr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Inferno</title>
<style>
  html,body{height:100%;margin:0;background:#04060a;color:#cfe4f2;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    display:grid;place-items:center;text-align:center}
  .wrap{opacity:.9}
  b{letter-spacing:.4em;font-size:14px;color:#8fb6ff}
  span{display:block;margin-top:12px;font-size:11px;letter-spacing:.15em;color:#6b8296}
  .dot{margin-top:22px;width:10px;height:10px;border-radius:50%;background:#3a5cff;
    box-shadow:0 0 18px #3a5cff;animation:p 1.4s ease-in-out infinite;margin-left:auto;margin-right:auto}
  @keyframes p{0%,100%{opacity:.4;transform:scale(.9)}50%{opacity:1;transform:scale(1.15)}}
</style>
</head>
<body>
  <div class="wrap">
    <b>INFERNO</b>
    <span>budim se…</span>
    <div class="dot"></div>
    <span style="margin-top:26px">ako se ne učita — proveri internet</span>
  </div>
</body>
</html>
